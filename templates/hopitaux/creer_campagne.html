<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organiser une Campagne - DonSang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #fff; height: 100vh; border-right: 1px solid #dee2e6; }
        .nav-link { color: #333; font-weight: 500; margin-bottom: 10px; border-radius: 8px; }
        .nav-link:hover, .nav-link.active { background-color: #e63946; color: white !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-danger { background-color: #e63946; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; }
        .btn-danger:hover { background-color: #d62828; }
        .form-label { font-weight: 600; color: #444; }
        .form-control, .form-select { padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        .form-control:focus { border-color: #e63946; box-shadow: 0 0 0 0.25rem rgba(230, 57, 70, 0.1); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3 position-fixed">
            <div class="d-flex align-items-center mb-4 ps-2">
                <i class="bi bi-droplet-fill text-danger fs-4 me-2"></i>
                <span class="fw-bold fs-5">DonSang</span>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'hopitaux:dashboard' %}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'hopitaux:creer_demande' %}"><i class="bi bi-plus-circle me-2"></i> Nouvelle Demande</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{% url 'hopitaux:liste_campagnes' %}"><i class="bi bi-calendar-event me-2"></i> Campagnes</a>
                </li>
                <hr>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/"><i class="bi bi-box-arrow-left me-2"></i> Retour Accueil</a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 offset-md-3 offset-lg-2">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="d-flex align-items-center mb-4">
                        <a href="{% url 'hopitaux:liste_campagnes' %}" class="btn btn-link text-dark p-0 me-3"><i class="bi bi-arrow-left fs-4"></i></a>
                        <h1 class="h2 mb-0">Organiser une Campagne</h1>
                    </div>

                    <div class="card p-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label for="{{ form.titre.id_for_label }}" class="form-label">Titre de la Campagne</label>
                                {{ form.titre }}
                            </div>
                            
                            <div class="mb-4">
                                <label for="{{ form.lieu.id_for_label }}" class="form-label">Lieu de Collecte</label>
                                {{ form.lieu }}
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="{{ form.date_debut.id_for_label }}" class="form-label">Date et Heure de Début</label>
                                    {{ form.date_debut }}
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label for="{{ form.date_fin.id_for_label }}" class="form-label">Date et Heure de Fin</label>
                                    {{ form.date_fin }}
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="{{ form.description.id_for_label }}" class="form-label">Détails et Informations</label>
                                {{ form.description }}
                            </div>

                            <div class="d-grid mt-2">
                                <button type="submit" class="btn btn-danger">Publier la Campagne</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
